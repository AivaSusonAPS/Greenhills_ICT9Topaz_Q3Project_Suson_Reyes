<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <title>Q3 Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="page-center">

    <div class="form-container">
        <h2>Create Account</h2>
        <p style="margin-bottom: 20px; color: #666;">Enter your details to join SwiftRide.</p>
        
        <input type="text" placeholder="First Name">
        <div class="split-input">
            <input type="number" placeholder="Age">
            <input type="text" placeholder="Contact Number">
        </div>
        <input type="email" placeholder="Email Address">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm Password">
        
        <button class="btn-main" onclick="goToConfirmation()">Create Account</button>
        <p style="margin-top: 15px; font-size: 14px; color: #777;">
            Already have an account? <a href="index.html" style="color: var(--secondary); font-weight: bold;">Login</a>
        </p>
    </div>

    <script src="proj.js"></script>
</body>
</html>
